name: R CI/CD

on:
  push:
    branches: ["main", "master", "develop"]
    tags: ["v*"]
  pull_request:
    branches: ["main", "master", "develop"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci:
    name: CI (R Checks)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev

      - name: Install R dependencies
        run: |
          Rscript -e "install.packages(c('dplyr','readxl','caret','randomForest','e1071','xgboost','pROC','ggplot2','tidyr','MASS'), repos='https://cloud.r-project.org')"

      - name: Validate script syntax
        run: |
          Rscript -e "parse(file='script.R'); cat('Syntax OK\\n')"

      - name: Minimal smoke test (dataset + target)
        run: |
          Rscript -e "library(readxl); df <- read_excel('dataset-uci.xlsx'); names(df) <- make.names(names(df)); stopifnot('Gallstone.Status' %in% names(df)); stopifnot(nrow(df) > 0); cat('Smoke test OK\\n')"

  cd:
    name: CD (Build Artifact)
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare artifact
        run: |
          mkdir -p dist
          cp script.R dist/
          if [ -f dataset-uci.xlsx ]; then cp dataset-uci.xlsx dist/; fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: r-pipeline-build
          path: dist/
          retention-days: 14

  release:
    name: Release (tag)
    runs-on: ubuntu-latest
    needs: ci
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create release archive
        run: |
          tar -czf gallstone-pipeline-${GITHUB_REF_NAME}.tar.gz script.R dataset-uci.xlsx 2>/dev/null || tar -czf gallstone-pipeline-${GITHUB_REF_NAME}.tar.gz script.R

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: gallstone-pipeline-${{ github.ref_name }}.tar.gz
